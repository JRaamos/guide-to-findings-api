services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_guide-to-findings
    environment:
      POSTGRES_DB: guide_to_findings
      POSTGRES_USER: guide_to_findings
      POSTGRES_PASSWORD: guide_to_findings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guide_to_findings -d guide_to_findings"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: always

  web:
    build:
      context: ./../guide-to-findings-front-end
    container_name: web_guide-to-findings
    ports:
      - 8080:80
    restart: always
  api:
    container_name: api
    build: .
    image: strapi:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/opt/app/config
      - ./src:/opt/app/src
      - ./package.json:/opt/package.json
      - ./.env:/opt/app/.env
      - ./public/uploads:/opt/app/public/uploads
    ports:
      - "1337:1337"

volumes:
  postgres_data:
